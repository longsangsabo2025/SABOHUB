workflows:
  ios-workflow:
    name: iOS App Store YAML Mode
    max_build_duration: 120
    instance_type: mac_mini_m1
    
    # Note: App Store Connect credentials are loaded from environment group 'app_store'
    # No integration needed - using environment variables instead
    
    environment:
      groups:
        - app_store # Group contains: APP_STORE_CONNECT_PRIVATE_KEY, BUNDLE_ID, ISSUER_ID, KEY_IDENTIFIER
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.sabohub.app
      vars:
        BUNDLE_ID: "com.sabohub.app"
        APP_NAME: "SABOHUB"
        APP_VERSION_NAME: "1.8.3"
        # Apple Developer Portal - Hardcoded for testing
        APP_STORE_CONNECT_ISSUER_ID: "4405e7f9-8e89-495a-b535-f9e83e96a7ad"
        APP_STORE_CONNECT_KEY_IDENTIFIER: "JL9L6RNRXB"
        APP_STORE_CONNECT_PRIVATE_KEY: |
          -----BEGIN PRIVATE KEY-----
          MIGTAgEAMBMGByqGSM49AgEGCCqGSM49AwEHBHkwdwIBAQQgODcxzeojG2ZCyrp5
          IUQYz9Hmt1j1SP+ir+/7F4Xyf2+gCgYIKoZIzj0DAQehRANCAATvHGwxR+IIQMjz
          grkecL92Sc33Hu7CmCHNEWS/G/eUKtYL03bpH4dZ/HdBNGnovyRKI3GvTzHGC461
          gsx6uVPf
          -----END PRIVATE KEY-----
        # Environment variables from .env file
        SUPABASE_URL: "https://dqddxowyikefqcdiioyh.supabase.co"
        SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRxZGR4b3d5aWtlZnFjZGlpb3loIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjE3OTcxMzYsImV4cCI6MjA3NzM3MzEzNn0.okmsG2R248fxOHUEFFl5OBuCtjtCIlO9q9yVSyCV25Y"
        SUPABASE_SERVICE_ROLE_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRxZGR4b3d5aWtlZnFjZGlpb3loIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc2MTc5NzEzNiwiZXhwIjoyMDc3MzczMTM2fQ.kPmlYlVd7wi_Luzp3MHjXmR8gUqrqDHy9PSzwFDq3XI"
        # Google Drive credentials (for documents feature)
        GOOGLE_DRIVE_CLIENT_ID_IOS: "321771498359-ocllju34h6cd4040ipoeq41j8mmg08p8.apps.googleusercontent.com"
        GOOGLE_DRIVE_CLIENT_ID_WEB: "321771498359-gcm0og29knjjmaevr7uv0aa27vam765u.apps.googleusercontent.com"
        GOOGLE_DRIVE_CLIENT_ID_ANDROID: "321771498359-tmnp2ks7n6ipjp10fsrjrefrilr6ts15.apps.googleusercontent.com"
        # Travis AI backend (production on Render)
        TRAVIS_API_URL: "https://api.longsang.org"
    
    cache:
      cache_paths:
        - $HOME/.pub-cache
        # Disable CocoaPods cache to avoid stale pods issue
        # - $HOME/Library/Caches/CocoaPods
    
    scripts:
      # 1. Clean iOS dependencies completely
      - name: Clean iOS dependencies
        script: |
          echo "🧹 Cleaning iOS artifacts completely..."
          cd ios
          rm -rf Pods
          rm -rf Podfile.lock
          rm -rf .symlinks
          rm -rf Flutter/Flutter.framework
          rm -rf Flutter/Flutter.podspec
          xcodebuild clean -workspace Runner.xcworkspace -scheme Runner || true
          cd ..
          # Clean DerivedData
          rm -rf ~/Library/Developer/Xcode/DerivedData/*
          echo "✅ iOS cleaned"
      
      # 2. Set up environment file
      - name: Set up .env file
        script: |
          echo "📝 Creating .env and .env.local files with environment variables..."
          cat <<EOF > .env
          SUPABASE_URL=$SUPABASE_URL
          SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY
          SUPABASE_SERVICE_ROLE_KEY=$SUPABASE_SERVICE_ROLE_KEY
          GOOGLE_DRIVE_CLIENT_ID_IOS=$GOOGLE_DRIVE_CLIENT_ID_IOS
          GOOGLE_DRIVE_CLIENT_ID_WEB=$GOOGLE_DRIVE_CLIENT_ID_WEB
          GOOGLE_DRIVE_CLIENT_ID_ANDROID=$GOOGLE_DRIVE_CLIENT_ID_ANDROID
          TRAVIS_API_URL=$TRAVIS_API_URL
          EOF
          cp .env .env.local
          echo "✅ .env and .env.local files created"
      
      # 3. Get Flutter packages
      - name: Get Flutter packages
        script: |
          echo "📦 Getting Flutter packages..."
          flutter pub get
      
      # 4. Install CocoaPods properly
      - name: Install pods
        script: |
          echo "☕ Installing CocoaPods dependencies..."
          cd ios
          pod deintegrate || true
          pod cache clean --all
          pod repo update
          pod install --repo-update --verbose
          cd ..
          echo "✅ Pods installed"
      
      # 5. Auto-increment build number (avoid duplicate version errors)
      - name: Auto-increment build number
        script: |
          echo "🔢 Auto-incrementing build number to avoid duplicates..."
          CURRENT_VERSION=$(grep "^version:" pubspec.yaml | cut -d' ' -f2)
          echo "Current version: $CURRENT_VERSION"
          
          # Split version into name and build number
          VERSION_NAME=$(echo $CURRENT_VERSION | cut -d'+' -f1)  # e.g., 1.0.8
          BUILD_NUMBER=$(echo $CURRENT_VERSION | cut -d'+' -f2)  # e.g., 30

          # Override version name for release if APP_VERSION_NAME is set
          if [ -n "$APP_VERSION_NAME" ]; then
            VERSION_NAME="$APP_VERSION_NAME"
          fi
          
          # Increment build number and avoid App Store duplicate uploads.
          # Use the larger value between (current+1) and unix timestamp.
          CANDIDATE_BUILD_NUMBER=$((BUILD_NUMBER + 1))
          TIME_BUILD_NUMBER=$(date +%s)
          if [ "$TIME_BUILD_NUMBER" -gt "$CANDIDATE_BUILD_NUMBER" ]; then
            NEW_BUILD_NUMBER=$TIME_BUILD_NUMBER
          else
            NEW_BUILD_NUMBER=$CANDIDATE_BUILD_NUMBER
          fi
          NEW_VERSION="${VERSION_NAME}+${NEW_BUILD_NUMBER}"
          
          echo "📱 Updating version to: $NEW_VERSION"
          sed -i.bak "s/^version: .*/version: $NEW_VERSION/" pubspec.yaml
          
          echo "✅ Version updated successfully"
          grep "^version:" pubspec.yaml
      
      # 6. Configure Xcode project with provisioning profiles
      - name: Set up code signing in Xcode
        script: |
          echo "🔧 Configuring Xcode project with provisioning profiles..."
          xcode-project use-profiles
          echo "✅ Xcode code signing configured"
      
      # 7. Flutter analyze (warnings don't fail build)
      - name: Flutter analyze
        script: |
          echo "🔍 Running Flutter analyze..."
          flutter analyze --no-fatal-warnings --no-fatal-infos || true
          echo "✅ Analysis complete (warnings ignored)"
      
      # 8. Flutter test (optional)
      # - name: Flutter test
      #   script: |
      #     flutter test
      #   ignore_failure: true
      
      # 9. Build iOS Archive
      - name: Build iOS Archive
        script: |
          echo "🏗️  Building iOS Archive for App Store..."
          flutter build ios --release --no-codesign \
            --dart-define=SUPABASE_URL=$SUPABASE_URL \
            --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY \
            --dart-define=SUPABASE_SERVICE_ROLE_KEY=$SUPABASE_SERVICE_ROLE_KEY
          echo "✅ iOS build completed"
      
      # 10. Create Xcode Archive
      - name: Create Xcode Archive
        script: |
          echo "📦 Creating Xcode archive..."
          xcodebuild -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath build/ios/Runner.xcarchive \
            archive
          echo "✅ Archive created"
      
      # 11. Export IPA with provisioning profile
      - name: Export IPA for App Store
        script: |
          echo "📤 Exporting IPA for App Store distribution..."
          xcodebuild -exportArchive \
            -archivePath build/ios/Runner.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist ios/ExportOptions.plist
          echo "✅ IPA exported successfully"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log
    publishing:
      email:
        recipients:
          - longsangsabo2025@gmail.com # ⚠️ THAY ĐỔI EMAIL CỦA BẠN Ở ĐÂY
        notify:
          success: true
          failure: true
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: true # Ready for App Store submission

  android-workflow:
    name: Android Workflow
    max_build_duration: 120
    instance_type: linux_x2
    environment:
