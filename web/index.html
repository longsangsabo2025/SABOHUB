<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="SABOHUB - Hệ thống quản lý doanh nghiệp đa ngành">

  <!-- Viewport: Critical for iOS proper scaling -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SABOHUB">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>SABOHUB - Quản lý quán bida chuyên nghiệp</title>
  <link rel="manifest" href="manifest.json">
  
  <!-- Google Maps API for Flutter Web -->
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyANL4uO7s57huPvnuV33IkKZvfVU5wJBWc"></script>
  
  <script>
    // Suppress DebugService errors in development
    const originalWarn = console.warn;
    console.warn = function(...args) {
      const message = args.join(' ');
      if (message.includes('DebugService: Error serving') || 
          message.includes('Cannot send Null')) {
        return; // Suppress these specific warnings
      }
      originalWarn.apply(console, args);
    };
  </script>
  <style>
    /* Prevent iOS Safari from auto-adjusting text size */
    html, body {
      -webkit-text-size-adjust: 100%;
      -moz-text-size-adjust: 100%;
      text-size-adjust: 100%;
      /* Prevent pull-to-refresh and overscroll on iOS */
      overscroll-behavior: none;
      overflow: hidden;
      height: 100%;
      width: 100%;
      margin: 0;
      padding: 0;
      /* Respect safe area (notch, home indicator) */
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }
    /* Prevent iOS double-tap zoom */
    * {
      touch-action: manipulation;
    }
    /* Prevent font boosting on mobile browsers */
    body {
      max-height: 100vh;
      font-size: 100%;
    }
  </style>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
